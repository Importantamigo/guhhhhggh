name: Fetch and Cache Contributors
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  fetch-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Fetch and Format Contributors
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p contributors_data
        
        REPOS=("Aliucord/Aliucord" "Aliucord/Manager" "Aliucord/website")
        
        OUTPUT_FILE="contributors_data/all_contributors.json"
        
        echo "[]" > $OUTPUT_FILE
        
        for REPO in "${REPOS[@]}"; do
          echo "Fetching contributors for $REPO..."
          
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/contributors?per_page=100")
            
          if echo "$RESPONSE" | jq empty; then
            FORMATTED_DATA=$(echo "$RESPONSE" | jq --arg repo "$REPO" '[.[] | {username: .login, avatarUrl: .avatar_url, commits: .contributions, repositories: [{name: $repo, commits: .contributions}]}]')
            
            jq -s '.[0] + .[1]' $OUTPUT_FILE <(echo "$FORMATTED_DATA") > temp.json
            mv temp.json $OUTPUT_FILE
          else
            echo "::error:: Failed to fetch or parse JSON for $REPO"
          fi
        done
        
        echo "Data successfully structured inside $OUTPUT_FILE"
    - name: Commit and Push to Repository
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add contributors_data/all_contributors.json
        
        if ! git diff-index --quiet HEAD; then
          git commit -m "chore: automated update of cached contributors"
          git push
        else
          echo "No changes detected in contributor counts. Skipping commit."
        fi
